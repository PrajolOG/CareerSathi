<!-- partials/chat_input.html -->
<div class="chat-input-wrapper">
    <!-- Animated File Preview Bubble -->
    <div id="filePreview" class="file-preview-container" style="display: none;">
        <div class="file-info">
            <div class="doc-icon-wrapper-small">
                <i class="fa-solid fa-image" id="fileIcon"></i>
            </div>
            <span id="fileNameDisplay" class="truncate-text">image.png</span>
        </div>
        <button type="button" class="remove-file-btn" onclick="clearFileSelection()" title="Remove file">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <div class="chat-input-surface">
        <!-- Main Chat Input Form -->
        <form class="chat-input-form group" id="chatForm">
            <!-- Hidden File Inputs -->
            <input type="file" id="imgUpload" style="display: none;" accept="image/*">

            <!-- Message Input (Multiline) -->
            <textarea class="chat-input-field" id="userInput" rows="1"
                placeholder="Ask about colleges, scholarships, or careers..."
                autocomplete="off"></textarea>

            <div class="input-actions">
                <!-- Image Upload Button -->
                <button type="button" class="icon-btn attach-btn" onclick="document.getElementById('imgUpload').click()" title="Upload Image">
                    <i class="fa-solid fa-image"></i>
                </button>

                <!-- Send Button with Glow -->
                <button type="submit" class="icon-btn send-btn ai-gradient-btn" id="sendBtn" title="Send Message">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>

    <div class="quick-chip-row" aria-hidden="true">
        <span class="quick-chip">What is Cyber Security?</span>
        <span class="quick-chip">How to find my passion?</span>
        <span class="quick-chip">Best jobs for 2026</span>
        <span class="quick-chip">Scholarship options?</span>
        <span class="quick-chip">How to prepare for interviews?</span>
        <span class="quick-chip">Effective time management tips</span>
    </div>
</div>
